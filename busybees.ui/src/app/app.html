<div class="busy-bees-container">
  <header>
    <h1><span class="bee-icon">🐝</span> BusyBees <span class="bee-icon">🐝</span></h1>
  </header>

  <main class="hive-grid">
    <section class="child-hive honey-yellow">
      <div class="header-tag">Alex's Tasks</div>
      <div class="chore-list">
        <button *ngFor="let chore of alexChores"
                (click)="toggleDone(chore)"
                [class.is-done]="chore.completed"
                class="chore-card">
          <span class="status-icon">{{ chore.completed ? '✅' : '🍯' }}</span>
          {{ chore.name }}
        </button>
      </div>
    </section>

    <section class="child-hive pollen-orange">
      <div class="header-tag">Sam's Tasks</div>
      <div class="chore-list">
        <button *ngFor="let chore of samChores"
                (click)="toggleDone(chore)"
                [class.is-done]="chore.completed"
                class="chore-card">
          <span class="status-icon">{{ chore.completed ? '✅' : '🍯' }}</span>
          {{ chore.name }}
        </button>
      </div>
    </section>
  </main>
</div>
<router-outlet />
